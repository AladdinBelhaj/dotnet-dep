services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=password
    ports:
      - "1433:1433"
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P 'password' -d master -Q 'SELECT 1' -C || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 30
      start_period: 40s

  migrations:
    image: mcr.microsoft.com/dotnet/sdk:9.0
    working_dir: /src/projet_backend
    volumes:
      - ./projet_backend:/src/projet_backend
      - /src/projet_backend/API/bin
      - /src/projet_backend/API/obj
      - /src/projet_backend/Context/bin
      - /src/projet_backend/Context/obj
      - /src/projet_backend/Entities/bin
      - /src/projet_backend/Entities/obj
    environment:
      - ConnectionStrings__ConnectionString=Server=db;Database=DotnetInventory;User Id=sa;Password=password;TrustServerCertificate=True;
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "sed -i 's/\r$//' /src/projet_backend/migrate.sh && bash /src/projet_backend/migrate.sh"

  api:
    build:
      context: ./projet_backend
      dockerfile: API/Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__ConnectionString=Server=db;Database=DotnetInventory;User Id=sa;Password=password;TrustServerCertificate=True;
      - AppSettings__Token=super secret key used in docker for jwt token generation and validation with sufficient length
    depends_on:
      db:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - api
    ports:
      - "5173:80"

